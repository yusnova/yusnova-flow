name: STLC PR Pipeline

on:
  pull_request:
    paths:
      - 'automation/**'
      - '.github/workflows/stlc-pr.yml'

jobs:
  stlc-pr:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Run STLC PR profile (design + codegen, no execution)
        env:
          STLC_LLM_API_KEY: ${{ secrets.STLC_LLM_API_KEY }}
          STLC_LLM_BASE_URL: ${{ secrets.STLC_LLM_BASE_URL }}
          STLC_LLM_MODEL: ${{ secrets.STLC_LLM_MODEL }}
          REGULAR_USER_USERNAME: ${{ secrets.REGULAR_USER_USERNAME }}
          REGULAR_USER_PASSWORD: ${{ secrets.REGULAR_USER_PASSWORD }}
        run: |
          npm run stlc:orchestrator -- \
            --url "https://www.saucedemo.com/inventory.html" \
            --domain inventory \
            --page InventoryPage \
            --requirement "AC: User must view product list\nAC: User must add product to cart" \
            --profile pr \
            --headless \
            --skip-human-gates

      - name: Upload STLC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stlc-pr-state
          path: automation/tmp/stlc/**
